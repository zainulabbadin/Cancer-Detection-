<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Cancer Detection System</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-dark-card">
            
            <h2>Create Account</h2>
            <p>Register for diagnostic access</p>

            <form id="signup-form">
                <div class="form-grp">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" placeholder="Dr. Zainulabbadin" required>
                </div>

                <div class="form-grp">
                    <label for="email">Institutional Email</label>
                    <input type="email" id="email" placeholder="doctor@hospital.org" required>
                </div>
                
                <div class="form-grp">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-auth">Register</button>
                
                <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                    <span style="color: var(--text-secondary);">Already have an account?</span> 
                    <a href="signin.html" style="color: var(--btn-blue); font-weight: 600; text-decoration: none;">Sign in here</a>
                </div>
            </form>
            
        </div>
    </div>
    
    <script src="../models/api.js"></script>
    <script src="../controllers/auth.controller.js" defer></script>
</body>
</html>
