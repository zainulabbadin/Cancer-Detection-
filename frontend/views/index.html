<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Analysis – AI Cancer Detection</title>
    <meta name="description" content="Upload a medical scan image for AI-powered cancer detection analysis.">
    <link rel="stylesheet" href="../styles/index.css">
</head>
<body>

    <div class="main-container">

        <!-- ══════════════════════════════════ -->
        <!--  Upload Card (with navbar inside)  -->
        <!-- ══════════════════════════════════ -->
        <section class="dark-card" id="section-upload">

            <!-- Navbar -->
            <div class="card-nav">
                <h1 class="card-nav-title">AI Cancer Detection</h1>
                <div class="card-nav-right">
                    <span class="welcome-text" id="nav-username">Welcome, Doctor</span>
                    <button class="btn-signout" id="logout-btn">Sign Out</button>
                </div>
            </div>
            <div class="card-nav-divider"></div>

            <h2>New Analysis</h2>

            <!-- Upload Zone (click only — no drag & drop) -->
            <div class="upload-box" id="drop-zone" role="button" tabindex="0" aria-label="Click to select medical image">
                <svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <div class="upload-text">Click to browse and select medical image</div>
                <div class="upload-hint">Supported formats: JPEG, PNG</div>
            </div>

            <!-- Hidden file input -->
            <input type="file" id="file-input" accept="image/jpeg,image/png" hidden>

            <!-- Image Preview (shown after selection) -->
            <div class="preview-area" id="preview-area">
                <img id="preview-img" src="" alt="Selected scan preview" class="img-preview">
                <button class="btn-remove" id="btn-remove-image">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                    Remove Image
                </button>
            </div>

            <!-- Analyze Button -->
            <button class="btn-primary-blue" id="btn-process" disabled>Analyze Scan</button>

            <!-- Inline status message -->
            <p class="upload-status" id="upload-status" aria-live="polite"></p>

        </section>

    </div>

    <!-- MVC Script order: Model → View → Controller -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="../models/api.js"></script>
    <script src="../controllers/ui.controller.js"></script>
    <script src="../controllers/app.controller.js" defer></script>

</body>
</html>
