<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – AI Cancer Detection | AI Diagnostic Engine</title>
  <meta name="description" content="Sign in to the Medical AI Diagnostic Portal for oncology specialists." />
  <link rel="stylesheet" href="../styles/auth.css" />
</head>
<body>

  <div class="auth-card">

    <!-- ====== LEFT BLUE PANEL (View) ====== -->
    <div class="auth-left">
      <div class="bokeh-extra"></div>
      <div class="auth-left-content">
        <h2>The Empathetic Expert</h2>
        <p>Empowering oncology specialists with precision AI diagnostics for clinical excellence and patient care.</p>
      </div>
    </div>

    <!-- ====== RIGHT FORM PANEL (View) ====== -->
    <div class="auth-right">

      <h1>Medical Portal</h1>
      <p class="subtitle">Sign in to the AI Diagnostic Engine</p>

      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <a href="signin.html" class="auth-tab active" id="tab-login">Login</a>
        <a href="signup.html" class="auth-tab" id="tab-signup">Sign Up</a>
      </div>

      <!-- Message Box (populated by controller) -->
      <div class="auth-message" id="auth-msg" role="alert" aria-live="polite"></div>

      <!-- Login Form -->
      <form id="signin-form" novalidate>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="physician@hospital.org"
              autocomplete="email"
              required
            />
          </div>
          <span class="field-error-msg" id="error-email"></span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password visibility">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error-msg" id="error-password"></span>
        </div>



        <!-- Remember & Forgot -->
        <div class="form-extras">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me" name="remember" />
            Remember device
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-submit" id="login-btn">
          Access Portal →
        </button>

        <!-- Footer -->
        <p class="auth-footer-text">
          By signing in, you agree to our
          <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </p>

      </form>
    </div>

  </div>

  <!-- MVC: Model layer first, then Controller -->
  <script src="../models/api.js"></script>
  <script src="../controllers/auth.controller.js" defer></script>

</body>
</html>
