<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Cancer Detection Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-brand">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:20px; animation: float 3s ease-in-out infinite;">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            <h2>AI-Powered Cancer Detection</h2>
            <p style="color: rgba(255,255,255,0.8); margin-top: 10px;">Fast, reliable, and intelligent analysis verified by advanced CLIP models.</p>
        </div>
        <div class="auth-form-panel">
            <h2 class="auth-title">Welcome Back</h2>
            <form id="signinForm">
                <div class="general-error error-msg" id="generalError"></div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="doctor@hospital.com">
                    <span class="error-msg" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                    <span class="error-msg" id="passwordError"></span>
                </div>

                <button type="submit" class="btn-primary" id="btnSubmit">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Request Access</a></p>
            </div>
        </div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="../controllers/auth.controller.js"></script>
</body>
</html>
