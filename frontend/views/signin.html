<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cancer Detection System</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-dark-card">
            
            <h2>Secure Login</h2>
            <p>Access your medical AI dashboard</p>

            <form id="signin-form">
                <div class="form-grp">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="doctor@hospital.org" required>
                </div>
                
                <div class="form-grp">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-auth">Sign In</button>
                
                <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                    <span style="color: var(--text-secondary);">New user?</span> 
                    <a href="signup.html" style="color: var(--btn-blue); font-weight: 600; text-decoration: none;">Create an account</a>
                </div>
            </form>
            
        </div>
    </div>
    
    <script src="../models/api.js"></script>
    <script src="../controllers/auth.controller.js" defer></script>
</body>
</html>
